name: Compilar APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - __uses__: actions/checkout@v4
    - name: Configurar Java
      __uses__: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
    - name: Dar permisos
      run: chmod +x gradlew
    - name: Compilar APK
      run: ./gradlew assembleDebug
    - name: Guardar APK
      __uses__: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
